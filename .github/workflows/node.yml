name: github-cicd

on:
  push:
    branches: [ "main" ]

jobs:
  build:

    runs-on: self-hosted

    strategy:
      matrix:
        node-version: ['20.x']

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    - run: |
        npm install

    - name: create file .env
      run: |
        touch .env
        echo "PORT=${{secrets.PORT}}" > .env
    - name: Restart github CI/CD service
      shell: bash
      run: pm2 restart github-cicd || pm2 start server.js --name "github-cicd"